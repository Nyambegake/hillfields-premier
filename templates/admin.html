{% extends "base.html" %}
{% block content %}

<section class="max-w-4xl mx-auto py-12">
    <h2 class="text-4xl font-bold mb-8">Admin Dashboard</h2>

    <form method="POST" action="/admin/update-profile" id="adminForm" class="space-y-6 bg-white p-8 rounded-xl shadow-xl">

        <div>
            <label>Deputy Principal</label>
            <input type="text" name="deputy_name"
                value="{{ profiles['deputy_principal']['name'] }}"
                class="w-full border p-3 rounded">
        </div>

        <div>
            <label>Head of Junior School</label>
            <input type="text" name="head_name"
                value="{{ profiles['head_junior']['name'] }}"
                class="w-full border p-3 rounded">
        </div>

        <button class="bg-gold px-6 py-3 rounded font-semibold">Update Profiles</button>
    </form>
</section>

{% endblock %}
